# Logging configuration for CMS Data Quality & Ingestion Pipeline
# ---------------------------------------------------------------
# Each stage logs to its own rotating file under logs/.
# Stage 05 (pipeline runner) logs only to console.
# Format: timestamp — logger — level — message

version: 1

# ------------------------------------------------------------------------------
# 1. Formatters
# ------------------------------------------------------------------------------
formatters:
  standard:
    format: "%(asctime)s — %(name)s — %(levelname)s — %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

# ------------------------------------------------------------------------------
# 2. Handlers
# ------------------------------------------------------------------------------
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  schema_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/schema.log
    maxBytes: 1048576
    backupCount: 3

  ingestion_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/ingestion.log
    maxBytes: 1048576
    backupCount: 3

  quality_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/quality.log
    maxBytes: 1048576
    backupCount: 3

  reporting_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/runner.log
    maxBytes: 1048576
    backupCount: 3

# ------------------------------------------------------------------------------
# 3. Loggers (one per stage)
# ------------------------------------------------------------------------------
loggers:
  stage01:
    level: INFO
    handlers: ["schema_file", "console"]
    propagate: false

  stage02:
    level: INFO
    handlers: ["ingestion_file", "console"]
    propagate: false

  stage03:
    level: INFO
    handlers: ["quality_file", "console"]
    propagate: false

  stage04:
    level: INFO
    handlers: ["reporting_file", "console"]
    propagate: false

  stage05:
    level: INFO
    handlers: ["console"]
    propagate: false

# ------------------------------------------------------------------------------
# 4. Root logger (fallback)
# ------------------------------------------------------------------------------
root:
  level: WARNING
  handlers: ["console"]
