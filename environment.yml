# ==============================================================================
# CMS POS/QIES Ingestion + Quality + Reporting Pipeline
# Conda environment for development, testing, and execution
# ==============================================================================

name: pos_qies_pipeline
channels:
  - conda-forge

dependencies:
  # ============================================================================
  # Core Python Runtime
  # ============================================================================
  - python=3.11

  # ============================================================================
  # Developer Tooling (formatting, linting, testing)
  # ============================================================================
  - black
  - isort
  - ruff
  - pytest

  # ============================================================================
  # Data Handling + File Formats
  # Stage 02 ingestion, Stage 03 profiling, Stage 04 reporting
  # ============================================================================
  - pandas
  - pyarrow
  - requests

  # ============================================================================
  # YAML + Configuration Parsing (Stage 05 runner)
  # ============================================================================
  - pyyaml

  # ============================================================================
  # Pip-only packages (none required yet)
  # ============================================================================
  - pip:
      - ""
