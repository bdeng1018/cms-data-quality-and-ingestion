# ==============================================================================
# Pytest Configuration for CMS POS/QIES Pipeline
# ==============================================================================

[pytest]

# ==============================================================================
# Test Discovery
# ==============================================================================
# All tests live under the tests/ directory.
testpaths = tests

# Test files follow the test_*.py naming convention.
python_files = test_*.py

# ==============================================================================
# Import Path Configuration
# ==============================================================================
# Ensure src/ is importable so Stage 01–05 modules resolve cleanly.
pythonpath = src

# ==============================================================================
# Pytest Runtime Options
# ==============================================================================
# -q : quiet mode (minimal noise)
# -W default : show warnings normally
addopts = -q -W default